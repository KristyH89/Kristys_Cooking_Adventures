<body class="min-h-screen flex flex-col bg-[#f3faf7]">

{{> navbar }}

  <!-- MAIN CONTENT -->
  <main class="flex-grow max-w-6xl mx-auto px-6 py-16">

    <h1 class="text-4xl font-bold text-green-700 text-center mb-10">
      Explore My Recipes
    </h1>

    <p class="text-center text-gray-700 max-w-2xl mx-auto mb-16">
      Choose a category to explore delicious homemade recipes.  
      Click on a picture to open the category.
    </p>

    <!-- CATEGORY GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">

      <!-- Baking & Desserts -->
      <a href="{{route 'categories/baking-desserts.html'}}" class="block group">
        <div class="relative rounded-xl overflow-hidden shadow-lg">
          <img src="/images/recipe-photos/rabarbercake.jpeg"
               class="w-full h-56 object-cover transition group-hover:scale-105"
               alt="Baking & Desserts">
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end justify-center pb-4">
  <h2 class="text-white text-2xl font-bold tracking-wide">Baking & Desserts</h2>
          </div>
        </div>
      </a>

      <!-- Easy -->
      <a href="{{route 'categories/easy.html'}}" class="block group">
        <div class="relative rounded-xl overflow-hidden shadow-lg">
          <img src="/images/recipe-photos/potatogratin.jpeg"
               class="w-full h-56 object-cover transition group-hover:scale-105"
               alt="Easy Recipes">
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end justify-center pb-4">
  <h2 class="text-white text-2xl font-bold tracking-wide">Easy</h2>
          </div>
        </div>
      </a>

      <!-- Main Dishes -->
      <a href="{{route 'categories/main-dishes.html'}}" class="block group">
        <div class="relative rounded-xl overflow-hidden shadow-lg">
          <img src="/images/recipe-photos/vildsvin-stamppot-wortels.jpeg"
               class="w-full h-56 object-cover transition group-hover:scale-105"
               alt="Main Dishes">
         <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end justify-center pb-4">
  <h2 class="text-white text-2xl font-bold tracking-wide">Main Dishes</h2>
          </div>
        </div>
      </a>

      <!-- Quick & Easy -->
      <a href="{{route 'categories/quick-easy.html'}}" class="block group">
        <div class="relative rounded-xl overflow-hidden shadow-lg">
          <img src="/images/recipe-photos/wrappizza.jpeg"
               class="w-full h-56 object-cover transition group-hover:scale-105"
               alt="Quick & Easy">
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end justify-center pb-4">
  <h2 class="text-white text-2xl font-bold tracking-wide">Quick & Easy</h2>
          </div>
        </div>
      </a>

      <!-- Slow & Special -->
      <a href="{{route 'categories/slow-special.html'}}" class="block group">
        <div class="relative rounded-xl overflow-hidden shadow-lg">
          <img src="/images/recipe-photos/vildsvin-rib-med-rod-kal-och-potatismos.jpeg"
               class="w-full h-56 object-cover transition group-hover:scale-105"
               alt="Slow & Special">
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end justify-center pb-4">

          </div>
        </div>
      </a>

      <a href="{{route 'categories/wild-game.html'}}" class="block group">
        <div class="relative rounded-xl overflow-hidden shadow-lg">

               class="w-full h-56 object-cover transition group-hover:scale-105"

          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end justify-center pb-4">
  <h2 class="text-white text-2xl font-bold tracking-wide">Wild Game</h2>

        </div>

  {{> footer }}
