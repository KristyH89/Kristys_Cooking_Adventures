<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Kristy's Cooking Adventures</title>

<script type="module" src="/src/main.js"></script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
<link rel="icon" type="image/png" href="/images/site/fork-knife.png" />

</head>

<body class="bg-white text-gray-800 font-sans flex flex-col min-h-screen">

 {{> navbar }}

  <!-- MAIN CONTENT -->
  <main class="flex-grow">

    <!-- FULL-WIDTH LIGHT GREEN BACKGROUND -->
<section class="w-full bg-[#f3faf7] py-16">
  <div class="max-w-4xl mx-auto px-6">

    <!-- TITLE -->
    <h1 class="text-4xl font-bold text-green-700 text-center mb-4">Contact</h1>

    <p class="text-gray-700 text-center mb-12 max-w-2xl mx-auto">
      Get in touch with me! Whether you have a question, a suggestion, or just want to say hi, 
      I’d love to hear from you.
    </p>

  <!-- FORM + IMAGE: MOBILE = STACKED, DESKTOP = 3 COLUMNS -->
<div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-[1fr_2.5fr_2fr] gap-10 md:gap-20">

  <!-- EMPTY BLOCK -->
  <div class="hidden md:block"></div>

  <!-- FORM -->
  <div class="order-1 md:order-none">
    <form id="contact-form" class="bg-white shadow-lg rounded-xl p-8">

      <h2 class="text-xl font-bold text-green-700 mb-6">Send a Message</h2>

      <div data-fs-success class="hidden bg-green-50 text-green-700 border border-green-200 rounded-lg px-4 py-3 mb-4">
        Thanks for your message! I'll get back to you soon.
      </div>

      <div data-fs-error class="hidden bg-red-50 text-red-700 border border-red-200 rounded-lg px-4 py-3 mb-4">
        Something went wrong. Please try again.
      </div>

      <label class="block mb-4" for="name">
        <span class="font-semibold text-gray-700">Name</span>
        <input
          type="text"
          id="name"
          name="name"
          data-fs-field
          placeholder="Enter your full name"
          required
          class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2"
        />
        <span data-fs-error="name" class="text-sm text-red-600"></span>
      </label>

      <label class="block mb-4" for="email">
        <span class="font-semibold text-gray-700">Email Address</span>
        <input
          type="email"
          id="email"
          name="email"
          data-fs-field
          placeholder="Enter your email"
          required
          class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2"
        />
        <span data-fs-error="email" class="text-sm text-red-600"></span>
      </label>

      <label class="block mb-6" for="message">
        <span class="font-semibold text-gray-700">Your Message</span>
        <textarea
          id="message"
          name="message"
          data-fs-field
          rows="5"
          placeholder="Write your message here..."
          required
          class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2"
        ></textarea>
        <span data-fs-error="message" class="text-sm text-red-600"></span>
      </label>

      <button
        type="submit"
        data-fs-submit-btn
        class="w-full bg-[rgb(54,151,111)] text-white font-semibold py-3 rounded-lg disabled:opacity-50"
      >
        Send Message
      </button>

    </form>
  </div>

  <!-- CAKE IMAGE -->
  <div class="order-2 md:order-none flex justify-center items-start md:items-center">
    <img
      src="/images/recipe-photos/Midsommar-tarta.jpeg"
      alt="Midsommar cake"
      class="w-full max-w-sm md:max-w-md rounded-xl shadow-md object-cover"
    />
  </div>

</div>

</div>

  </div>
</section>


  </main>

  {{> footer }}

  <script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#contact-form', formId: 'xdarllyk' });
  </script>

</body>
</html>
