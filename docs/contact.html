<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Kristy's Cooking Adventures</title>

  <link rel="icon" type="image/png" href="/Workshop2_HTML_CSS/assets/fork-knife-H0eCKHP6.png" />
  <script type="module" crossorigin src="/Workshop2_HTML_CSS/assets/main-D-tVJucA.js"></script>
  <link rel="stylesheet" crossorigin href="/Workshop2_HTML_CSS/assets/main-CNoIyjjB.css">
</head>

<body class="bg-white text-gray-800 font-sans flex flex-col min-h-screen">

  <!-- LOGO BANNER -->
  <header class="w-full bg-white py-6 flex justify-center">
    <img 
      src="/Workshop2_HTML_CSS/assets/logoindex4-grGiZbhq.jpg" 
      alt="Kristy's Cooking Adventures" 
      class="max-w-3xl w-full h-auto"
    />
  </header>

  <!-- NAVBAR -->
  <nav class="w-full bg-[rgba(54,151,111,0.6)] py-4 shadow-md">
    <ul class="flex justify-center gap-10 text-white font-bold text-lg">
      <li><a href="index.html" class="hover:text-green-200">Home</a></li>
      <li><a href="food.html" class="hover:text-green-200">Food</a></li>
      <li><a href="contact.html" class="hover:text-green-200">Contact</a></li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="flex-grow">

    <!-- FULL-WIDTH LIGHT GREEN BACKGROUND -->
<section class="w-full bg-[#f3faf7] py-16">
  <div class="max-w-4xl mx-auto px-6">

    <!-- TITLE -->
    <h1 class="text-4xl font-bold text-green-700 text-center mb-4">Contact</h1>

    <p class="text-gray-700 text-center mb-12 max-w-2xl mx-auto">
      Get in touch with me! Whether you have a question, a suggestion, or just want to say hi, 
      I’d love to hear from you.
    </p>

   <!-- FORM + IMAGE: MOBILE = STACKED, DESKTOP = 3 COLUMNS -->
<div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-[1fr_2.5fr_2fr] gap-10 md:gap-20">

  <!-- LEEG VAK (ALLEEN OP DESKTOP) -->
  <div class="hidden md:block"></div>

  <!-- FORM -->
  <div class="order-1 md:order-none">
    <form class="bg-white shadow-lg rounded-xl p-8">

      <label class="block mb-4">
        <span class="font-semibold text-gray-700">Name</span>
        <input 
          type="text" 
          placeholder="Enter your full name"
          class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2"
        />
      </label>

      <label class="block mb-4">
        <span class="font-semibold text-gray-700">Email Address</span>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2"
        />
      </label>

      <label class="block mb-6">
        <span class="font-semibold text-gray-700">Your Message</span>
        <textarea 
          rows="5"
          placeholder="Write your message here..."
          class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2"
        ></textarea>
      </label>

      <button 
        type="submit"
        class="w-full bg-[rgb(54,151,111)] text-white font-semibold py-3 rounded-lg"
      >
        Send Message
      </button>

    </form>
  </div>

  <!-- CAKE IMAGE -->
  <div class="order-2 md:order-none flex justify-center items-start md:items-center">
    <img 
      src="/Workshop2_HTML_CSS/assets/Midsommar-tarta-BZ00c5bo.jpeg"
      alt="Midsommar cake"
      class="w-full max-w-sm md:max-w-md rounded-xl shadow-md object-cover"
    />
  </div>

</div>

  </div>
</section>




  </main>

  <!-- FOOTER -->
  <footer class="bg-[rgb(54,151,111)] text-white py-6 mt-12">
    <nav class="mb-3">
      <ul class="flex justify-center gap-6 text-lg font-medium">
        <li><a href="index.html" class="hover:text-green-200">Home</a></li>
        <li><a href="food.html" class="hover:text-green-200">Food</a></li>
        <li><a href="contact.html" class="hover:text-green-200">Contact</a></li>
      </ul>
    </nav>

    <p class="text-center text-green-200 text-sm">
      © 2026 🍴 Kristy's Cooking Adventures 
    </p>
  </footer>

</body>
</html>
